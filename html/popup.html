<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4Pulse</title>
    <link rel="stylesheet" href="popup.css">

    <style>
        /* SVG Icon система */
        .icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .btn-icon { width: 12px !important; height: 12px !important; }

        /* Аватар пользователя */
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background-color: var(--theme-bg-secondary);
            border: 2px solid var(--theme-border);
        }

        .icon-sm {
            width: 16px;
            height: 16px;
        }

        .icon-lg {
            width: 24px;
            height: 24px;
        }

        .icon-xl {
            width: 28px;
            height: 28px;
        }

        /* Часы и дата — font-family inherited from body (set by applyFontSettings) */
        .header-time {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 5px;
        }

        /* Плавные переходы без дерганья */
        * {
            transition: none;
        }

        .interactive {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                       opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .interactive:hover {
            transform: translateY(-1px);
        }

        .interactive:active {
            transform: translateY(0);
        }

        /* Убираем дерганье при изменении контента */
        #topic-list,
        #qms-list,
        #mentions-list {
            /* min-height управляется через JS — не задаём здесь */
        }

        /* Плавное появление только для новых карточек (без анимации по умолчанию) */
        .topic-card {
            /* Убрали animation: fadeIn - было причиной дерганья */
        }

        /* ==================================================
           СТИЛИ ДЛЯ INLINE-ЧАТА (БЫСТРЫЙ ОТВЕТ QMS)
           ================================================== */

        /* Читаем акцентные цвета 4Pulse */
        :root { --chat-accent: #2982cc; }
        [data-accent="purple"] { --chat-accent: #8e44ad; }
        [data-accent="blue"] { --chat-accent: #2982cc; }
        [data-accent="teal"] { --chat-accent: #16a085; }
        [data-accent="orange"] { --chat-accent: #e67e22; }
        [data-accent="red"] { --chat-accent: #e74c3c; }
        [data-accent="pink"] { --chat-accent: #e84393; }
        /* 🌌 Cosmic: lock chat-accent to teal-cyan regardless of chosen accent */
        body[data-theme="cosmic"] { --chat-accent: #00a8b5; }

        .qms-inline-chat {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--theme-border, #eee);
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: default;
            animation: fadeIn 0.2s ease-out forwards;
            /* History scrolls, reply form always visible at bottom */
            min-height: 0;
        }

        .qms-history {
            max-height: 240px;
            min-height: 80px;
            overflow-y: auto;
            font-size: var(--font-sm, 13px);
            background: var(--theme-bg-secondary, rgba(128, 128, 128, 0.05));
            border: 1px solid var(--theme-border, rgba(128, 128, 128, 0.2));
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Уменьшаем высоту истории в компактном режиме, чтобы влезла форма! */
        body.compact-mode .qms-history {
            max-height: 150px;
            min-height: 60px;
        }

        .qms-history::-webkit-scrollbar { width: 6px; }
        .qms-history::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.4); border-radius: 4px; }

        .qms-msg {
            padding: 6px 10px;
            border-radius: 8px;
            max-width: 90%;
            word-break: break-word;
            line-height: 1.4;
        }

        .qms-msg.in {
            background: rgba(128, 128, 128, 0.15); /* Универсальный полупрозрачный серый фон */
            border: 1px solid var(--theme-border, rgba(128, 128, 128, 0.2));
            color: inherit;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .qms-msg.out {
            background: var(--chat-accent); /* Цвет берется из настроек расширения */
            color: #ffffff !important;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .qms-msg * {
            color: inherit !important;
            background: transparent !important;
        }

        .qms-loading-text {
            text-align: center;
            color: #888;
            font-size: 12px;
            padding: 10px;
        }

        .qms-reply-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .qms-textarea {
            width: 100%;
            min-height: 50px;
            max-height: 100px;
            resize: vertical;
            padding: 8px;
            border: 1px solid var(--theme-border, #ccc);
            border-radius: 6px;
            font-family: inherit;
            font-size: var(--font-sm, 13px);
            background: transparent;
            color: inherit;
            box-sizing: border-box;
        }

        .qms-textarea:focus {
            outline: none;
            border-color: var(--chat-accent); /* Рамка в цвет акцента */
        }

        .qms-reply-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .qms-reply-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            background: var(--bg-2, rgba(128,128,128,0.18));
            color: var(--text, #fff);
            transition: background 0.15s;
        }

        .qms-reply-actions .qms-btn-send {
            background: var(--chat-accent);
            color: #fff;
        }
        .qms-reply-actions .qms-btn-send:hover { filter: brightness(0.9); }
        .qms-reply-actions button:hover:not(.qms-btn-send) { filter: brightness(0.9); }
        .qms-reply-actions button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Base style for QMS chat buttons (separate from .action-btn to avoid conflicts) */
        .qms-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            background: var(--bg-2, rgba(128,128,128,0.18));
            color: var(--text, #fff);
            transition: background 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
        }
        .qms-btn.qms-btn-send {
            background: var(--chat-accent) !important;
            color: #fff !important;
        }
        .qms-btn.qms-btn-send:hover { filter: brightness(0.9); }
        .qms-btn:hover:not(.qms-btn-send) { filter: brightness(0.85); }
        .qms-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        /* Keep card-actions visible when inline chat is open */
        .topic-card:has(.qms-inline-chat:not(.hidden)) .card-actions { opacity: 1; }

        .qms-emoji-picker {
            padding: 8px;
            background: rgba(128, 128, 128, 0.05); /* Полупрозрачный фон, подстроится под любую тему */
            border: 1px solid rgba(128, 128, 128, 0.2); /* Мягкая полупрозрачная рамка */
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
        }

        body.compact-mode .qms-emoji-picker {
            max-height: 80px; /* В компактном режиме панель чуть меньше */
        }

        .qms-emoji-picker::-webkit-scrollbar { width: 4px; }
        .qms-emoji-picker::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.4); border-radius: 4px; }

        .qms-emoji-item {
            cursor: pointer;
            text-align: center;
            font-size: 18px;
            user-select: none;
            transition: transform 0.1s;
        }

        .qms-emoji-item:hover {
            transform: scale(1.3);
        }

        /* ════════════════════════════════════
           🌌 COSMIC PULSE — inline QMS chat
           ════════════════════════════════════ */
        body[data-theme="cosmic"] .qms-inline-chat {
            border-top-color: rgba(0,242,254,0.18);
        }

        /* История сообщений */
        body[data-theme="cosmic"] .qms-history {
            background: rgba(4,12,26,0.55);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(0,242,254,0.16);
            box-shadow: inset 0 0 12px rgba(0,242,254,0.04);
        }
        body[data-theme="cosmic"] .qms-history::-webkit-scrollbar { width: 3px; }
        body[data-theme="cosmic"] .qms-history::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 4px; }

        /* Входящие сообщения */
        body[data-theme="cosmic"] .qms-msg.in {
            background: rgba(0,242,254,0.07);
            border-color: rgba(0,242,254,0.18);
            color: #fff;
        }

        /* Поле ввода */
        body[data-theme="cosmic"] .qms-textarea {
            background: rgba(4,12,26,0.60) !important;
            color: #fff !important;
            border: 1px solid rgba(0,242,254,0.22) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            caret-color: #00f2fe;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        body[data-theme="cosmic"] .qms-textarea::placeholder { color: rgba(161,255,206,0.45); }
        body[data-theme="cosmic"] .qms-textarea:focus {
            border-color: #00f2fe !important;
            box-shadow: 0 0 8px rgba(0,242,254,0.25) !important;
            outline: none;
        }

        /* Панель смайликов */
        body[data-theme="cosmic"] .qms-emoji-picker {
            background: rgba(4,12,26,0.70);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(0,242,254,0.18);
        }
        body[data-theme="cosmic"] .qms-emoji-picker::-webkit-scrollbar { width: 3px; }
        body[data-theme="cosmic"] .qms-emoji-picker::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 4px; }

        /* Кнопки: Смайлики и Свернуть */
        body[data-theme="cosmic"] .qms-btn {
            background: rgba(0,242,254,0.10) !important;
            color: #a1ffce !important;
            border: 1px solid rgba(0,242,254,0.22) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.18s ease, border-color 0.18s ease,
                        box-shadow 0.18s ease, color 0.18s ease, transform 0.12s ease;
        }
        body[data-theme="cosmic"] .qms-btn:hover:not(.qms-btn-send):not(:disabled) {
            background: rgba(0,242,254,0.18) !important;
            border-color: #00f2fe !important;
            color: #fff !important;
            box-shadow: 0 0 8px rgba(0,242,254,0.28);
            transform: translateY(-1px);
            filter: none !important;
        }
        body[data-theme="cosmic"] .qms-btn:active:not(:disabled) {
            transform: translateY(0px) scale(0.97);
        }

        /* Кнопка Отправить */
        body[data-theme="cosmic"] .qms-btn.qms-btn-send {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important;
            color: #000d1a !important;
            border: none !important;
            font-weight: 600;
            box-shadow: 0 0 10px rgba(0,242,254,0.30);
            transition: box-shadow 0.18s ease, transform 0.12s ease, filter 0.18s ease;
        }
        body[data-theme="cosmic"] .qms-btn.qms-btn-send:hover:not(:disabled) {
            box-shadow: 0 0 18px rgba(0,242,254,0.55);
            transform: translateY(-1px);
            filter: brightness(1.08) !important;
        }
        body[data-theme="cosmic"] .qms-btn.qms-btn-send:active:not(:disabled) {
            transform: scale(0.97);
        }

        /* Dot */
        body[data-theme="cosmic"] .qms-dot { fill: #000d1a !important; }

        /* 🎫 Ticket styles */
        .ticket-card-inner {
            padding: 10px 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
        }
        .ticket-row-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            min-height: 18px;
        }
        .ticket-row-meta {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ticket-row-meta:empty { display: none; }
        .ticket-section-tag {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .3px;
            background: var(--bg-2);
            color: var(--text-2);
            padding: 2px 7px;
            border-radius: 10px;
            border: 1px solid var(--border);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .ticket-responsible {
            font-size: 10px;
            color: var(--text-3);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ticket-title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.35;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .ticket-snippet {
            font-size: 11px;
            color: var(--text-3);
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .ticket-actions {
            display: flex;
            gap: 5px;
            margin-top: 3px;
        }
        .ticket-btn {
            flex: 1;
            font-size: 11px;
            font-weight: 500;
            padding: 5px 4px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            text-align: center;
            transition: opacity .15s, background .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-width: 0;
            overflow: hidden;
        }
        .ticket-btn:hover  { opacity: .85; }
        .ticket-btn:active { opacity: .65; }
        .ticket-btn-open  {
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text);
        }
        .ticket-btn-wip   {
            border: none;
            background: var(--accent);
            color: #fff;
        }
        .ticket-btn-done  {
            border: 1px solid #22c55e44;
            background: #22c55e18;
            color: #16a34a;
        }
        body[data-theme="dark"] .ticket-btn-done,
        body[data-theme="liquid-glass"] .ticket-btn-done {
            border-color: #22c55e33;
            background: #22c55e15;
            color: #4ade80;
        }
        .ticket-time {
            font-size: 10px;
            color: var(--text-3);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ticket-status {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ticket-status-new  { background: #fee2e2; color: #b91c1c; }
        .ticket-status-wip  { background: #fef3c7; color: #92400e; }
        .ticket-status-done { background: #d1fae5; color: #065f46; }
        body.dark .ticket-status-new  { background: #7f1d1d; color: #fca5a5; }
        body.dark .ticket-status-wip  { background: #78350f; color: #fcd34d; }
        body.dark .ticket-status-done { background: #064e3b; color: #6ee7b7; }
        .ticket-viewed { opacity: 0.65; }
    </style>
</head>

                        <svg class="icon icon-sm"><use href="#icon-edit"></use></svg>
                    </button>
                    <button class="bm-delete-btn" aria-label="Удалить">
                        <svg class="icon icon-sm"><use href="#icon-trash"></use></svg>
                    </button>
                </div>
            </li>
        </template>
        <template id="tpl-topic-card">
            <li class="topic-card interactive">
                <div class="card-header">
                    <svg class="topic-type-icon icon"><use href="#icon-file-text"></use></svg>
                    <svg class="topic-pin-icon icon hidden"><use href="#icon-pin"></use></svg>
                    <svg class="topic-focus-icon icon hidden" title="Приоритет"><use href="#icon-target"></use></svg>
                    <svg class="topic-mute-icon icon hidden" title="Тихий режим"><use href="#icon-bell"></use></svg>
                </div>
                <div class="card-body">
                    <div class="topic-title">Заголовок темы</div>
                    <div class="topic-meta">
                        <span class="topic-author">
                            <svg class="icon-sm"><use href="#icon-user"></use></svg>
                            username
                        </span>
                        <span class="topic-time">• 5 минут назад</span>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="action-icon topic-focus-btn interactive" title="Режим концентрации: следить за темой">
                        <svg class="icon"><use href="#icon-target"></use></svg>
                    </button>
                    <button class="action-icon topic-mute-btn interactive" title="Тихий режим: заглушить уведомления">
                        <svg class="icon"><use href="#icon-bell"></use></svg>
                    </button>
                    <button class="action-icon mark-read interactive" title="Отметить прочитанным">
                        <svg class="icon"><use href="#icon-eye"></use></svg>
                    </button>
                </div>
            </li>
        </template>

        <template id="tpl-topic-card-simple">
            <li class="topic-card simple interactive">
                <div class="card-header">
                    <svg class="topic-type-icon icon"><use href="#icon-file-text"></use></svg>
                    <svg class="topic-pin-icon icon hidden"><use href="#icon-pin"></use></svg>
                    <svg class="topic-focus-icon icon hidden" title="Приоритет"><use href="#icon-target"></use></svg>
                    <svg class="topic-mute-icon icon hidden" title="Тихий режим"><use href="#icon-bell"></use></svg>
                </div>
                <div class="card-body">
                    <div class="topic-title">Заголовок темы</div>
                </div>
                <div class="card-actions">
                    <button class="action-icon topic-focus-btn interactive" title="Режим концентрации: следить за темой">
                        <svg class="icon"><use href="#icon-target"></use></svg>
                    </button>
                    <button class="action-icon topic-mute-btn interactive" title="Тихий режим: заглушить уведомления">
                        <svg class="icon"><use href="#icon-bell"></use></svg>
                    </button>
                    <button class="action-icon mark-read interactive" title="Отметить прочитанным">
                        <svg class="icon"><use href="#icon-eye"></use></svg>
                    </button>
                </div>
            </li>
        </template>
    </div>

    <!-- 🗑 Custom confirm dialog -->
    <div id="bm-confirm-dialog" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.55); align-items:center; justify-content:center;">
        <div style="background:var(--bg-3); border-radius:14px; padding:20px 18px 14px; width:260px; box-shadow:0 8px 32px rgba(0,0,0,0.5); border:1px solid var(--border-md);">
            <div id="bm-confirm-msg" style="font-size:13px; color:var(--text); margin-bottom:16px; line-height:1.45;"></div>
            <div style="display:flex; gap:8px; justify-content:flex-end;">
                <button id="bm-confirm-cancel" style="padding:6px 14px; border-radius:8px; border:1px solid var(--border-md); background:var(--bg-4); color:var(--text-2); font-size:12px; cursor:pointer;">Отмена</button>
                <button id="bm-confirm-ok" style="padding:6px 14px; border-radius:8px; border:none; background:#e74c3c; color:#fff; font-size:12px; font-weight:600; cursor:pointer;">Удалить</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
